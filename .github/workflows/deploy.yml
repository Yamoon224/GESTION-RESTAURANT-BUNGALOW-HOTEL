name: CD — Déploiement Production

on:
  push:
    branches: [deployment]

jobs:
  deploy:
    name: Déploiement via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build des assets avant envoi ──────────────
      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances npm
        run: npm ci

      - name: Build des assets
        run: npm run build

      # ── Déploiement SSH ───────────────────────────
      - name: Déployer sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo ">>> Pull des dernières modifications..."
            git pull origin deployment

            echo ">>> Installation des dépendances PHP..."
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            echo ">>> Mise en mode maintenance..."
            php artisan down --retry=60

            echo ">>> Migrations..."
            php artisan migrate --force

            echo ">>> Nettoyage des caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo ">>> Copie des assets compilés..."
            # Les assets sont déjà dans public/build via le checkout
            # Si besoin : rsync ou autre méthode de copie

            echo ">>> Redémarrage des queues..."
            php artisan queue:restart || true

            echo ">>> Retour en production..."
            php artisan up

            echo "✅ Déploiement terminé."
